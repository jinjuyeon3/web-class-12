<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스와이퍼js</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="./css/study1.css">
    <script src="./js/study1.js"></script>
</head>
<body>
    <!-- Slider main container -->
    <div class="swiper station">
    <!-- Additional required wrapper -->
        <ul class="swiper-wrapper train">
            <!-- Slides -->
            <li class="swiper-slide">
                <img src="./img/이은지.png" alt="이은지 사진">
            </li>
            <li class="swiper-slide">
                <img src="./img/윤예영.png" alt="윤예영 사진">
            </li>
            <li class="swiper-slide">
                <img src="./img/장윤서-1.png" alt="장윤서 사진">
            </li>
        </ul>
        <div class="swiper-pagination"></div>
    </div>

    <!-- Slider main container -->
    <div class="swiper station2">
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    <!-- Additional required wrapper -->
        <ul class="swiper-wrapper train">
            <!-- Slides -->
            <li class="swiper-slide">
                <img src="./img/이은지.png" alt="이은지 사진">
            </li>
            <li class="swiper-slide">
                <img src="./img/윤예영.png" alt="윤예영 사진">
            </li>
            <li class="swiper-slide">
                <img src="./img/장윤서-1.png" alt="장윤서 사진">
            </li>
        </ul>
        <div class="swiper-pagination"></div>
    </div>

</div>
</body>
</html>
