<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모달 팝업 기능</title>
    <link rel="stylesheet" href="./css/ex2.css">
    <script src="./js/ex2.js"></script>
</head>
<body>

    <div class="popup">
        <div class="content-popup">
            정말로 삭제하시겠습니까?
        </div>
        <div class="popup-controler">
            <span class="btn-yes">예</span>
            <span class="btn-no">아니오</span>
        </div>
    </div>

    <div class="container">
        <h1>title</h1>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Obcaecati nisi dolorum soluta, doloribus iure eos labore dolor voluptatem? Ea cumque nihil perferendis expedita fuga dolor quo totam consectetur atque impedit!</p>
    </div>
</body>
</html>

<!-- 모달 팝업은 팝업창이 뜨면서 뒤에 어두운 레이어가 깔림 -> 가시적으로 팝업이 눈에 띄게 보이면서 오작동을 방지함 -> 사용자에게 중요한 의사결정을 물어볼 때 많이 씀 -->
